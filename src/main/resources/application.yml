server:
  port: 8899
  servlet:
    context-path: /Aqua

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/Aqua?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER
  web:
    resources:
      static-locations: classpath:/META-INF/resources/, classpath:/resources/, classpath:/static/, classpath:/public/

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: org.example.aquabackend.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
jwt:
  secret: Ciallo!!!
  expiration: 86400000 # 24小时（毫秒）

logging:
  level:
    org.example.aquabackend: DEBUG
    org.springframework.security: DEBUG
