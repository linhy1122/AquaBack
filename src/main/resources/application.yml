server:
  port: 8899
  servlet:
    context-path: /Aqua  # 重要：记住访问时需要包含这个路径

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/Aqua?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  mvc:
    pathmatch:
      matching-strategy: ANT_PATH_MATCHER  # ✅ 解决Spring Boot 2.7兼容性问题
  web:
    resources:
      static-locations: classpath:/META-INF/resources/, classpath:/resources/, classpath:/static/, classpath:/public/

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: org.example.aquabackend
  configuration:
    map-underscore-to-camel-case: true

# 启用详细日志以便调试
logging:
  level:
    org.springframework.web: DEBUG
    springfox: DEBUG

knife4j:
  # 开启增强配置
  enable: true
basic:
  enable: true
  # Basic认证用户名
  username: test
  # Basic认证密码
  password: 123


jwt:
  secret: Ciallo!!!
  expiration: 86400000 # 24 hours in ms
